# Single-node prod stack tuned for 10–50k concurrent users.
# Layout: nginx (TLS, rate limit, cache, WS upgrade) → oi-api (REST + WS + gRPC) → CH + Redis.
# For the two-node replicated setup, see docker-compose.replicated.yml.
version: "3.9"

services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: oi-clickhouse
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    volumes:
      - ch_data:/var/lib/clickhouse
      - ch_logs:/var/log/clickhouse-server
      - ../migrations:/docker-entrypoint-initdb.d:ro
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    # No public port — only the docker network reaches CH.
    expose: ["8123", "9000"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 2s
      retries: 20

  redis:
    image: redis:7.4-alpine
    container_name: oi-redis
    # `tcp-keepalive 60` keeps the pub/sub broadcaster connection
    # alive across NAT timeouts on long-idle channels.
    command:
      - redis-server
      - --maxmemory
      - "2gb"
      - --maxmemory-policy
      - "allkeys-lru"
      - --appendonly
      - "yes"
      - --tcp-keepalive
      - "60"
      - --tcp-backlog
      - "4096"
    sysctls:
      # Higher SOMAXCONN inside the redis container — its accept
      # queue would otherwise cap at 128, audible at 10k+ WS clients.
      net.core.somaxconn: 4096
    volumes:
      - redis_data:/data
    expose: ["6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 2s
      retries: 20

  collector:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: collector
    container_name: oi-collector
    depends_on:
      clickhouse: { condition: service_healthy }
      redis:      { condition: service_healthy }
    environment:
      RUST_LOG: info
      OI_CONFIG: /etc/oi/collector.toml
      OI_CLICKHOUSE__URL: http://clickhouse:8123
      OI_REDIS__URL: redis://redis:6379
    volumes:
      - ./collector.toml:/etc/oi/collector.toml:ro
      - oi_wal:/var/lib/oi/wal
    restart: unless-stopped

  api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: api
    # No container_name so docker compose --scale api=N works.
    depends_on:
      clickhouse: { condition: service_healthy }
      redis:      { condition: service_healthy }
    environment:
      RUST_LOG: info
      OI_API_CONFIG: /etc/oi/api.toml
      OI_API_CLICKHOUSE__URL: http://clickhouse:8123
      OI_API_REDIS__URL: redis://redis:6379
    volumes:
      - ./api.toml:/etc/oi/api.toml:ro
      - /etc/oi/tls:/etc/oi/tls:ro
    # ulimits so the tokio task pool can hold many WS file descriptors
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    expose: ["8080", "9091"]
    # gRPC port still bound to host because nginx terminates TLS at
    # nginx then proxies to oi-api over plaintext; the host:50051
    # is unused for clients (they hit nginx:50051). Keep it expose-only.
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: oi-nginx
    depends_on:
      - api
    ports:
      - "80:80"          # ACME http-01 + HTTPS redirect
      - "443:443"        # Public REST + WebSocket
      - "50051:50051"    # Public gRPC (h2 over TLS)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
      - nginx_cache:/var/cache/nginx
    ulimits:
      nofile:
        soft: 200000
        hard: 200000
    restart: unless-stopped

  # ClickHouse backup sidecar — s3-compatible target (DO Spaces /
  # AWS S3 / Backblaze B2). Set env in .env or skip the service.
  clickhouse-backup:
    image: altinity/clickhouse-backup:2.6.6
    container_name: oi-ch-backup
    depends_on:
      clickhouse: { condition: service_healthy }
    environment:
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_USERNAME: default
      REMOTE_STORAGE: ${BACKUP_STORAGE:-none}
      S3_BUCKET: ${BACKUP_S3_BUCKET:-}
      S3_REGION: ${BACKUP_S3_REGION:-}
      S3_ACCESS_KEY: ${BACKUP_S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${BACKUP_S3_SECRET_KEY:-}
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./backup/config.yml:/etc/clickhouse-backup/config.yml:ro
    command: server
    restart: unless-stopped

volumes:
  ch_data:
  ch_logs:
  redis_data:
  nginx_cache:
  oi_wal:
