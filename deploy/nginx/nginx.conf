# nginx reverse proxy for oi-api at scale.
#
# What this gets us at 10–50k users:
#   * TLS termination + HTTP/2 (HTTP/3 / QUIC enabled too — h3 in
#     Cargo Cult is optional but free).
#   * WebSocket upgrade for /ws/v1/oi/subscribe with sensible
#     proxy timeouts.
#   * Per-IP rate limiting with two tiers (unauthenticated vs
#     authenticated — auth tier sees ~50× the limit).
#   * Micro-cache for /v1/oi/latest (1s) — collapses 50k poll
#     clients into 1 backend request/sec per (exchange, symbol).
#   * Connection-keepalive pool to upstream so axum doesn't burn
#     CPU re-establishing connections.
#   * Real-IP / X-Forwarded-For passthrough so oi-api metrics
#     and logs see client IPs, not 127.0.0.1.
#
# The single config also serves gRPC over h2c on a separate
# listener — gRPC clients (Rust terminal etc.) hit this. WebSocket
# clients hit the main 443 vhost.

worker_processes auto;
worker_rlimit_nofile 200000;            # supports ~50k WS + REST traffic
events {
    worker_connections 65535;
    use epoll;
    multi_accept on;
}

http {
    # ----- Logging --------------------------------------------------
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent rt=$request_time '
                    'upstream=$upstream_response_time '
                    '"$http_user_agent" cache=$upstream_cache_status';
    access_log /var/log/nginx/access.log main buffer=64k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ----- TCP / keepalive ------------------------------------------
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 10000;
    types_hash_max_size 4096;
    server_tokens off;
    client_max_body_size 1m;          # API gets only small bodies

    # ----- Real IP behind any future LB/CDN -------------------------
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ----- Rate limit zones -----------------------------------------
    # Two tiers — anonymous (strict) and bearer-authenticated
    # (generous). The map below decides which zone a request falls
    # into based on the Authorization header presence; we don't
    # validate the token here (oi-api does), so an invalid bearer
    # gets the generous zone but oi-api rejects with 401 anyway —
    # net effect: invalid auth is cheap to reject and doesn't burn
    # anonymous quota.
    map $http_authorization $rate_limit_key {
        default        $binary_remote_addr;          # unauthenticated → by IP
        ~^Bearer\s+    $http_authorization;          # authenticated → by token
    }
    limit_req_zone $rate_limit_key zone=oi_api:20m rate=50r/s;
    limit_req_zone $binary_remote_addr zone=oi_anon:10m rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=conn_per_ip:10m;

    # ----- Micro-cache for /v1/oi/latest ----------------------------
    # Data changes at most once per minute; even a 1s cache collapses
    # a polling stampede into one upstream hit. 100MB keys_zone holds
    # ~700k cached entries — well above the 1800-instrument universe.
    proxy_cache_path /var/cache/nginx/oi_latest
                     levels=1:2 keys_zone=oi_latest:100m
                     max_size=500m inactive=10m use_temp_path=off;

    # ----- Upstream pool with keepalive ----------------------------
    upstream oi_api_rest {
        server api:8080 max_fails=3 fail_timeout=10s;
        # scale-out later: add more servers here
        keepalive 256;
        keepalive_requests 10000;
        keepalive_timeout 75s;
    }

    upstream oi_api_grpc {
        server api:50051;
        keepalive 64;
    }

    # ----- WebSocket upgrade map -----------------------------------
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # ----- HTTP -> HTTPS redirect ----------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # Let's Encrypt http-01 challenge.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ----- Public REST + WS endpoint -------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name oi.example.com;          # change before deploy

        ssl_certificate     /etc/letsencrypt/live/oi.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oi.example.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;
        ssl_stapling on;
        ssl_stapling_verify on;

        # HSTS — uncomment after verifying TLS works end-to-end.
        # add_header Strict-Transport-Security "max-age=31536000" always;

        limit_conn conn_per_ip 100;   # max 100 concurrent connections per IP

        # ---- WebSocket subscribe ----------------------------------
        location /ws/ {
            limit_req zone=oi_api burst=20 nodelay;
            proxy_pass http://oi_api_rest;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # WS connections are long-lived — disable proxy buffering
            # and bump read timeout. The oi-api side sends a ping
            # every 30s so 1h idle is the right ceiling.
            proxy_buffering off;
            proxy_read_timeout 1h;
            proxy_send_timeout 1h;
        }

        # ---- Latest with micro-cache ------------------------------
        location ~ ^/v1/oi/latest/ {
            limit_req zone=oi_api burst=200 nodelay;

            proxy_cache oi_latest;
            proxy_cache_key "$scheme$request_method$host$request_uri";
            proxy_cache_valid 200 1s;          # collapse polling stampede
            proxy_cache_valid 404 5s;
            proxy_cache_use_stale error timeout http_500 http_502 http_503;
            proxy_cache_background_update on;
            proxy_cache_lock on;
            proxy_cache_lock_timeout 500ms;
            add_header X-Cache-Status $upstream_cache_status;

            proxy_pass http://oi_api_rest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ---- Range queries (uncached — heavy, paginated) ---------
        location ~ ^/v1/oi/range/ {
            limit_req zone=oi_api burst=20 nodelay;
            proxy_pass http://oi_api_rest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 30s;
        }

        # ---- Funding endpoints (cached lightly) ------------------
        location ~ ^/v1/funding/ {
            limit_req zone=oi_api burst=50 nodelay;
            proxy_cache oi_latest;
            proxy_cache_valid 200 2s;
            add_header X-Cache-Status $upstream_cache_status;
            proxy_pass http://oi_api_rest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        # ---- Health & metrics: unmetered, internal ----------------
        location /health {
            proxy_pass http://oi_api_rest;
            proxy_set_header Host $host;
            access_log off;
        }
        # /metrics intentionally NOT exposed publicly. Scrape via
        # the internal docker network. Uncomment + ACL below if
        # you want public access.
        # location /metrics {
        #     allow 10.0.0.0/8;
        #     deny all;
        #     proxy_pass http://api:9091/metrics;
        # }

        # ---- Default: stricter limits, no cache ------------------
        location / {
            limit_req zone=oi_anon burst=10 nodelay;
            proxy_pass http://oi_api_rest;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # ----- gRPC vhost (h2 over TLS) --------------------------------
    server {
        listen 50051 ssl;
        listen [::]:50051 ssl;
        http2 on;
        server_name oi.example.com;

        ssl_certificate     /etc/letsencrypt/live/oi.example.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/oi.example.com/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        # gRPC trailers + long-lived streams need bigger timeouts.
        grpc_read_timeout 1h;
        grpc_send_timeout 1h;
        client_body_timeout 1h;

        location / {
            grpc_pass grpc://oi_api_grpc;
            grpc_set_header X-Real-IP $remote_addr;
            grpc_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
