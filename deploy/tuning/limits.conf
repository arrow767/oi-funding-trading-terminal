# Per-user file descriptor limits.
# Install:
#   sudo cp deploy/tuning/limits.conf /etc/security/limits.d/99-oi.conf
#   (re-login required to apply to your shell)
#
# Docker containers in this stack also set their own `ulimits:`
# blocks in docker-compose.yml; this file covers the host shell
# and any systemd-managed processes outside Docker.

*  soft  nofile  262144
*  hard  nofile  262144
*  soft  nproc   65535
*  hard  nproc   65535
