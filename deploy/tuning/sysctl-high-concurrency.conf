# Linux kernel tuning for the oi-api node serving 10–50k
# concurrent WebSocket clients.
#
# Install:
#   sudo cp deploy/tuning/sysctl-high-concurrency.conf /etc/sysctl.d/99-oi.conf
#   sudo sysctl --system
#
# Each setting is annotated with WHY — adjust only with a reason.

# ---- File descriptors ---------------------------------------------
# Max OS-wide open file descriptors. Each TCP socket counts. 50k WS
# + nginx upstream + CH/Redis sockets fits comfortably under 1M.
fs.file-max = 1048576

# ---- Network: connection backlog ----------------------------------
# When new connections arrive faster than userspace can accept(),
# they queue here. Default 4096 is too small under SYN floods or
# during a reconnect storm.
net.core.somaxconn = 65535
net.ipv4.tcp_max_syn_backlog = 65535
net.core.netdev_max_backlog = 65535

# ---- Network: ephemeral ports -------------------------------------
# nginx → oi-api connections need ephemeral ports on the nginx side.
# Default 32768–60999 = ~28k ports, which limits concurrent
# upstream connections. Open up to 64k.
net.ipv4.ip_local_port_range = 1024 65535
# Reuse TIME_WAIT sockets — safe when our app is a TCP client of
# upstream (oi-api / CH / Redis). DO NOT enable tcp_tw_recycle —
# it's removed in modern kernels and breaks NAT.
net.ipv4.tcp_tw_reuse = 1
# Don't linger on FIN_WAIT2 for the kernel default 60s — these are
# closed connections, we don't need them held that long.
net.ipv4.tcp_fin_timeout = 15

# ---- Network: TCP buffers -----------------------------------------
# Auto-tuning with explicit ranges. Bigger receive buffer means
# fewer reads → less syscall overhead at 50k connections.
net.ipv4.tcp_rmem = 4096 87380 16777216
net.ipv4.tcp_wmem = 4096 65536 16777216
net.core.rmem_max = 16777216
net.core.wmem_max = 16777216

# ---- Network: keepalive -------------------------------------------
# Detect dead WebSocket connections (client laptop closed, NAT
# dropped session) within reasonable bounds — default is 2 hours.
net.ipv4.tcp_keepalive_time = 120
net.ipv4.tcp_keepalive_intvl = 30
net.ipv4.tcp_keepalive_probes = 3

# ---- conntrack (NAT/firewall state table) -------------------------
# Default 65536 is hit fast at high WS counts. ufw uses conntrack.
net.netfilter.nf_conntrack_max = 524288
# Don't track established TCP for an hour — overflow risk on long-
# lived WS sessions otherwise.
net.netfilter.nf_conntrack_tcp_timeout_established = 86400

# ---- Memory: swappiness -------------------------------------------
# Server has no swap (per deployment doc); set vm.swappiness very
# low so even if someone adds swap later we don't swap CH out
# under transient load.
vm.swappiness = 1
vm.overcommit_memory = 1
