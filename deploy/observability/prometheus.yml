# Prometheus scrape config for the OI platform.
# Drop into a Prometheus container next to the stack and point its
# `--config.file` at this.

global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/oi.yml

scrape_configs:
  - job_name: oi-collector
    static_configs:
      - targets: ["collector:9090"]
  - job_name: oi-api
    static_configs:
      - targets: ["api:9091"]
